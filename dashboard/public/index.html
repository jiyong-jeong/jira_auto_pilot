<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jira → Claude 자동화 대시보드</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> body { background:#0b1020; } </style>
</head>
<body>
  <div id="root" class="text-slate-100"></div>

  <script type="text/babel">
const { useState, useEffect, useCallback } = React;

const api = {
  async get(p) { const r = await fetch(p); return r.json(); },
  async post(p, body) {
    const r = await fetch(p, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body || {}) });
    return r.json();
  },
};

function Section({ title, children, right }) {
  return (
    <div className="bg-slate-900/70 border border-slate-700 rounded-xl p-5 mb-5">
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-lg font-semibold">{title}</h2>
        {right}
      </div>
      {children}
    </div>
  );
}

function InfoTip({ text }) {
  return (
    <span className="relative inline-block ml-1 align-middle group">
      <span className="inline-flex items-center justify-center w-4 h-4 rounded-full bg-slate-600 text-slate-200 text-[10px] font-bold cursor-help select-none">i</span>
      <span className="pointer-events-none absolute left-0 bottom-full mb-2 w-72 rounded-lg bg-slate-800 border border-slate-600 px-3 py-2 text-xs leading-relaxed text-slate-200 opacity-0 group-hover:opacity-100 transition-opacity shadow-xl z-50 whitespace-normal">
        {text}
        <span className="absolute left-3 top-full border-4 border-transparent border-t-slate-800"></span>
      </span>
    </span>
  );
}

function Field({ label, value, onChange, type = "text", placeholder, info }) {
  return (
    <label className="block mb-3">
      <span className="text-sm text-slate-400">{label}{info && <InfoTip text={info} />}</span>
      <input
        type={type} value={value || ""} placeholder={placeholder}
        onChange={(e) => onChange(e.target.value)}
        className="mt-1 w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-400"
      />
    </label>
  );
}

function Btn({ children, onClick, color = "indigo", disabled }) {
  const colors = {
    indigo: "bg-indigo-600 hover:bg-indigo-500",
    green: "bg-emerald-600 hover:bg-emerald-500",
    red: "bg-rose-600 hover:bg-rose-500",
    slate: "bg-slate-700 hover:bg-slate-600",
  };
  return (
    <button onClick={onClick} disabled={disabled}
      className={`${colors[color]} disabled:opacity-40 text-white text-sm font-medium px-4 py-2 rounded-lg transition`}>
      {children}
    </button>
  );
}

const stageBadge = {
  "plan-ready": ["질문 대기(plan)", "bg-sky-500/20 text-sky-300 border-sky-500/40"],
  "awaiting-answer": ["답변 대기(claude-answered)", "bg-violet-500/20 text-violet-300 border-violet-500/40"],
  "build-ready": ["개발 대기(build)", "bg-amber-500/20 text-amber-300 border-amber-500/40"],
  "failed": ["실패(claude-failed)", "bg-rose-500/20 text-rose-300 border-rose-500/40"],
  "done": ["완료(DEV COMPLETED)", "bg-emerald-500/20 text-emerald-300 border-emerald-500/40"],
};

const resultBadge = {
  "success": ["성공", "bg-emerald-500/20 text-emerald-300 border-emerald-500/40"],
  "skip": ["스킵(답변대기)", "bg-slate-500/20 text-slate-300 border-slate-500/40"],
  "skip-idempotent": ["스킵(중복방지)", "bg-sky-500/20 text-sky-300 border-sky-500/40"],
  "failed": ["실패", "bg-rose-500/20 text-rose-300 border-rose-500/40"],
};

function App() {
  const [config, setConfig] = useState(null);
  const [creds, setCreds] = useState(null);
  const [credInput, setCredInput] = useState({ anthropicApiKey: "", githubToken: "", atlassianEmail: "", atlassianToken: "", slackWebhookUrl: "" });
  const [status, setStatus] = useState({ plan: { running: false }, build: { running: false } });
  const [logs, setLogs] = useState({ plan: "", build: "" });
  const [cards, setCards] = useState([]);
  const [cardsErr, setCardsErr] = useState("");
  const [history, setHistory] = useState([]);
  const [toast, setToast] = useState("");
  const [envFile, setEnvFile] = useState({ path: "", content: "", mtime: null, exists: false, loaded: false });

  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2500); };

  const loadAll = useCallback(async () => {
    setConfig(await api.get("/api/config"));
    const c = await api.get("/api/credentials");
    setCreds(c);
    setCredInput((p) => ({ ...p, atlassianEmail: c.atlassianEmail || "" }));
    setStatus(await api.get("/api/loops/status"));
  }, []);

  useEffect(() => { loadAll(); loadHistory(); }, [loadAll]);

  // 폴링: 상태 + 로그 + 이력
  useEffect(() => {
    const t = setInterval(async () => {
      setStatus(await api.get("/api/loops/status"));
      for (const type of ["plan", "build"]) {
        const r = await api.get(`/api/logs/${type}?lines=120`);
        setLogs((p) => ({ ...p, [type]: r.log || "" }));
      }
      loadHistory();
    }, 4000);
    return () => clearInterval(t);
  }, []);

  const saveConfig = async () => { await api.post("/api/config", config); flash("설정 저장됨"); };
  const saveCreds = async () => {
    await api.post("/api/credentials", credInput);
    setCredInput((p) => ({ ...p, anthropicApiKey: "", githubToken: "", atlassianToken: "", slackWebhookUrl: "" }));
    setCreds(await api.get("/api/credentials"));
    flash("자격증명 저장됨");
  };
  const toggleLoop = async (type) => {
    const running = status[type]?.running;
    const r = await api.post(`/api/loops/${type}/${running ? "stop" : "start"}`);
    flash(r.ok ? `${type} 루프 ${running ? "중지" : "시작"}` : (r.message || "실패"));
    setStatus(await api.get("/api/loops/status"));
  };
  const loadCards = async () => {
    const r = await api.get("/api/cards");
    if (r.ok) { setCards(r.issues); setCardsErr(""); }
    else { setCardsErr(r.message || "조회 실패"); }
  };
  const loadHistory = async () => {
    const r = await api.get("/api/history?limit=100");
    if (r.ok) setHistory(r.entries || []);
  };
  const loadEnv = async () => {
    const r = await api.get("/api/env");
    if (r.ok) setEnvFile({ path: r.path, content: r.content, mtime: r.mtime, exists: r.exists, loaded: true });
    else flash(r.message || "env 로드 실패");
  };
  const saveEnv = async () => {
    const r = await api.post("/api/env", { content: envFile.content });
    if (r.ok) { flash("work.env 저장됨 (.bak 백업 생성)"); setEnvFile((p) => ({ ...p, mtime: r.mtime, exists: true })); }
    else flash(r.message || "저장 실패");
  };

  if (!config || !creds) return <div className="p-10">불러오는 중…</div>;

  const credSet = (k) => creds[k] === true;

  return (
    <div className="max-w-5xl mx-auto px-6 py-8">
      <h1 className="text-2xl font-bold mb-1">Jira → Claude 자동화 대시보드</h1>
      <p className="text-slate-400 text-sm mb-6">workspace·repo·주기를 설정하고 plan/build 루프를 제어·모니터링합니다.</p>

      {toast && <div className="fixed top-4 right-4 bg-indigo-600 px-4 py-2 rounded-lg text-sm shadow-lg z-50">{toast}</div>}

      {/* 제어 */}
      <Section title="루프 제어"
        right={<Btn color="slate" onClick={loadAll}>새로고침</Btn>}>
        <div className="grid grid-cols-2 gap-4">
          {["plan", "build"].map((type) => {
            const running = status[type]?.running;
            return (
              <div key={type} className="bg-slate-800/60 border border-slate-700 rounded-lg p-4">
                <div className="flex items-center justify-between mb-2">
                  <span className="font-semibold">{type} 루프</span>
                  <span className={`text-xs px-2 py-1 rounded-full border ${running ? "bg-emerald-500/20 text-emerald-300 border-emerald-500/40" : "bg-slate-600/30 text-slate-400 border-slate-600"}`}>
                    {running ? `실행 중 (pid ${status[type].pid})` : "중지됨"}
                  </span>
                </div>
                <Btn color={running ? "red" : "green"} onClick={() => toggleLoop(type)}>
                  {running ? "중지" : "시작"}
                </Btn>
              </div>
            );
          })}
        </div>
        <p className="text-xs text-slate-500 mt-3">시작 시 즉시 1회 탐지 후, 설정된 주기(정시 정렬)로 반복합니다.</p>
      </Section>

      {/* 설정 */}
      <Section title="프로젝트 설정" right={<Btn onClick={saveConfig}>저장</Btn>}>
        <div className="grid grid-cols-2 gap-x-5">
          <Field label="GitHub Repository URL" value={config.repoUrl} onChange={(v) => setConfig({ ...config, repoUrl: v })} placeholder="https://github.com/Org/repo.git" />
          <Field label="Base 브랜치" value={config.baseBranch} onChange={(v) => setConfig({ ...config, baseBranch: v })} />
          <Field label="Jira 사이트" value={config.jiraSite} onChange={(v) => setConfig({ ...config, jiraSite: v })} placeholder="xxx.atlassian.net" />
          <Field label="프로젝트 키 (workspace)" value={config.projectKey} onChange={(v) => setConfig({ ...config, projectKey: v })} placeholder="PROJ" />
          <Field label="담당자 이메일" value={config.assigneeEmail} onChange={(v) => setConfig({ ...config, assigneeEmail: v })} />
          <Field label="담당자 이름" value={config.assigneeName} onChange={(v) => setConfig({ ...config, assigneeName: v })} />
          <label className="block mb-3">
            <span className="text-sm text-slate-400">트리거 방식</span>
            <select
              value={config.triggerMode || "label"}
              onChange={(e) => setConfig({ ...config, triggerMode: e.target.value })}
              className="mt-1 w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-400">
              <option value="label">라벨 (권장)</option>
              <option value="text">텍스트 (레거시)</option>
            </select>
          </label>
          {config.triggerMode === "text"
            ? <Field label="트리거 텍스트 (text 모드)" value={config.triggerText} onChange={(v) => setConfig({ ...config, triggerText: v })} />
            : <Field label="트리거 라벨 (label 모드)" value={config.triggerLabel} onChange={(v) => setConfig({ ...config, triggerLabel: v })} placeholder="claude-work" />}
          <Field label="완료 상태명" value={config.doneStatus} onChange={(v) => setConfig({ ...config, doneStatus: v })} />
          <Field label="plan 라벨" value={config.plannedLabel} onChange={(v) => setConfig({ ...config, plannedLabel: v })} />
          <Field label="주기(초)" type="number" value={config.intervalSeconds} onChange={(v) => setConfig({ ...config, intervalSeconds: parseInt(v || "3600", 10) })} />
          <Field label="동시 처리 상한 (병렬)" type="number" value={config.maxParallel} onChange={(v) => setConfig({ ...config, maxParallel: parseInt(v || "3", 10) })} placeholder="3" />
          <Field label="작업 폴더 (WORK_DIR)" value={config.workDir} onChange={(v) => setConfig({ ...config, workDir: v })} />
          <Field label="env 파일 경로 (work.env)" value={config.envPath} onChange={(v) => setConfig({ ...config, envPath: v })} placeholder="/path/to/work.env" />
          <Field label="clone 베이스 폴더" value={config.cloneBase} onChange={(v) => setConfig({ ...config, cloneBase: v })} placeholder="/path/to/repos" />
          <Field label="테스트 명령 (비우면 자동 감지)" value={config.testCmd} onChange={(v) => setConfig({ ...config, testCmd: v })} placeholder="예: npm test / pytest" />
          <Field label="빌드 명령 (비우면 자동 감지)" value={config.buildCmd} onChange={(v) => setConfig({ ...config, buildCmd: v })} placeholder="예: npm run build" />
        </div>
        <p className="text-xs text-slate-500 mt-2">PR 전 검증: 테스트가 있으면 통과까지 수정, 없으면 빌드만 시도(빌드 수단 없으면 건너뜀).</p>
      </Section>

      {/* 자격증명 */}
      <Section title="자격증명 (로컬 저장)" right={<Btn onClick={saveCreds}>저장</Btn>}>
        <p className="text-xs text-amber-300/80 mb-3">⚠ 토큰은 이 컴퓨터의 credentials.json(권한 600)에 저장됩니다. 입력란을 비워두면 기존 값이 유지됩니다.</p>
        <div className="grid grid-cols-2 gap-x-5">
          <Field label={`Anthropic API Key ${credSet("anthropicApiKey") ? "✓ 저장됨" : ""}`} type="password" value={credInput.anthropicApiKey} onChange={(v) => setCredInput({ ...credInput, anthropicApiKey: v })} placeholder={credSet("anthropicApiKey") ? "••• 저장됨" : "sk-ant-..."}
            info="루프 안에서 Claude Code(claude)가 카드 검토·개발·Jira 코멘트를 수행할 때 인증에 사용합니다. 비워두면 이 컴퓨터의 로컬 claude 로그인으로 폴백합니다." />
          <Field label={`GitHub Token ${credSet("githubToken") ? "✓ 저장됨" : ""}`} type="password" value={credInput.githubToken} onChange={(v) => setCredInput({ ...credInput, githubToken: v })} placeholder={credSet("githubToken") ? "••• 저장됨" : "ghp_..."}
            info="대상 repo clone/push 와 PR 생성(gh CLI)에 사용합니다. 비워두면 로컬 gh auth 로그인으로 폴백합니다. repo 쓰기 권한이 필요합니다." />
          <Field label="Atlassian 이메일" value={credInput.atlassianEmail} onChange={(v) => setCredInput({ ...credInput, atlassianEmail: v })} placeholder="you@company.com"
            info="Jira REST 조회(Basic 인증)의 계정 이메일입니다. 아래 API Token 과 짝으로 카드 조회·REST 탐지에 사용됩니다." />
          <Field label={`Atlassian API Token ${credSet("atlassianToken") ? "✓ 저장됨" : ""}`} type="password" value={credInput.atlassianToken} onChange={(v) => setCredInput({ ...credInput, atlassianToken: v })} placeholder={credSet("atlassianToken") ? "••• 저장됨" : "Atlassian API token"}
            info="대시보드 카드 상태 조회와 REST 탐지(/api/cards, /api/detect)에 쓰는 Jira API 토큰입니다. id.atlassian.com 에서 발급. (루프 내 claude 의 Jira 작업은 별도로 Atlassian MCP OAuth 를 사용)" />
          <Field label={`Slack Incoming Webhook ${credSet("slackWebhookUrl") ? "✓ 저장됨" : ""}`} type="password" value={credInput.slackWebhookUrl} onChange={(v) => setCredInput({ ...credInput, slackWebhookUrl: v })} placeholder={credSet("slackWebhookUrl") ? "••• 저장됨" : "https://hooks.slack.com/services/..."}
            info="설정하면 카드가 처리 완료(또는 반복 실패)될 때마다 이 Webhook 으로 알림을 보냅니다. 비워두면 알림은 스킵됩니다." />
        </div>
        <p className="text-xs text-slate-500 mt-2">Slack Webhook 을 입력하면 카드가 처리 완료될 때마다 알림을 보냅니다. 비워두면 알림은 스킵됩니다.</p>
      </Section>

      {/* work.env 편집 */}
      <Section title="work.env 파일"
        right={<div className="flex gap-2"><Btn color="slate" onClick={loadEnv}>불러오기</Btn><Btn color="green" onClick={saveEnv} disabled={!envFile.loaded}>저장</Btn></div>}>
        <div className="flex items-center justify-between text-xs text-slate-400 mb-2">
          <span>경로: <span className="text-slate-300">{envFile.path || config.envPath}</span></span>
          <span>{envFile.loaded ? (envFile.exists ? `수정: ${new Date(envFile.mtime).toLocaleString()}` : "파일 없음 (저장 시 생성)") : "불러오기를 눌러 내용을 편집하세요"}</span>
        </div>
        <textarea
          value={envFile.content}
          onChange={(e) => setEnvFile({ ...envFile, content: e.target.value })}
          disabled={!envFile.loaded}
          spellCheck={false}
          placeholder={envFile.loaded ? "KEY=VALUE 형식" : "‘불러오기’ 후 편집 가능"}
          className="w-full h-72 bg-black/60 border border-slate-700 rounded-lg p-3 text-xs font-mono disabled:opacity-50 focus:outline-none focus:border-indigo-400"
        />
        <p className="text-xs text-amber-300/80 mt-2">⚠ 시크릿 파일입니다. 저장 시 기존 파일은 .bak 으로 백업되며, 대상 repo로 복사될 때 커밋되지 않도록 .gitignore 에 포함되어야 합니다.</p>
      </Section>

      {/* 카드 상태 */}
      <Section title="카드 상태" right={<Btn color="slate" onClick={loadCards}>조회</Btn>}>
        {cardsErr && <p className="text-rose-400 text-sm mb-2">{cardsErr}</p>}
        {cards.length === 0 ? (
          <p className="text-slate-500 text-sm">조회 버튼을 눌러 {config.triggerMode === "text" ? config.triggerText : config.triggerLabel} 카드 상태를 확인하세요. (Atlassian 자격증명 필요)</p>
        ) : (
          <table className="w-full text-sm">
            <thead><tr className="text-slate-400 text-left border-b border-slate-700">
              <th className="py-2">키</th><th>요약</th><th>상태</th><th>단계</th>
            </tr></thead>
            <tbody>
              {cards.map((c) => {
                const [label, cls] = stageBadge[c.stage] || ["-", ""];
                return (
                  <tr key={c.key} className="border-b border-slate-800">
                    <td className="py-2"><a href={c.url} target="_blank" className="text-indigo-400 hover:underline">{c.key}</a></td>
                    <td className="pr-3">{c.summary}</td>
                    <td className="text-slate-300">{c.status}</td>
                    <td><span className={`text-xs px-2 py-1 rounded-full border ${cls}`}>{label}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Section>

      {/* 처리 이력 */}
      <Section title="처리 이력" right={<Btn color="slate" onClick={loadHistory}>새로고침</Btn>}>
        {history.length === 0 ? (
          <p className="text-slate-500 text-sm">아직 처리 이력이 없습니다. (루프가 카드를 처리하면 history.jsonl 에 기록됩니다)</p>
        ) : (
          <table className="w-full text-sm">
            <thead><tr className="text-slate-400 text-left border-b border-slate-700">
              <th className="py-2">시각</th><th>키</th><th>단계</th><th>결과</th><th>PR</th><th>브랜치</th>
            </tr></thead>
            <tbody>
              {history.map((h, i) => {
                const [label, cls] = resultBadge[h.result] || [h.result || "-", "bg-slate-600/30 text-slate-300 border-slate-600"];
                return (
                  <tr key={i} className="border-b border-slate-800">
                    <td className="py-2 text-slate-400 whitespace-nowrap">{h.ts ? new Date(h.ts).toLocaleString() : "-"}</td>
                    <td className="text-slate-200">{h.key}</td>
                    <td className="text-slate-300">{h.phase}</td>
                    <td><span className={`text-xs px-2 py-1 rounded-full border ${cls}`}>{label}</span></td>
                    <td>{h.pr ? <a href={h.pr} target="_blank" className="text-indigo-400 hover:underline">PR</a> : <span className="text-slate-600">-</span>}</td>
                    <td className="text-slate-400 font-mono text-xs">{h.branch || "-"}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Section>

      {/* 로그 */}
      <Section title="실시간 로그">
        <div className="grid grid-cols-2 gap-4">
          {["plan", "build"].map((type) => (
            <div key={type}>
              <div className="text-sm text-slate-400 mb-1">loop-{type}.log</div>
              <pre className="bg-black/60 border border-slate-700 rounded-lg p-3 text-xs h-64 overflow-auto whitespace-pre-wrap">{logs[type] || "(비어 있음)"}</pre>
            </div>
          ))}
        </div>
      </Section>

      <p className="text-center text-slate-600 text-xs mt-6">로컬 전용 · 토큰은 외부로 전송되지 않습니다</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
