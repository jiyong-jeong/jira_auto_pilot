<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jira → Claude 자동화 대시보드</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
  <style>
    body { background:#0b1020; }
    /* GitHub 유사 마크다운 렌더(다크테마) — PR 리뷰/코멘트 본문 */
    .md-body { font-size:12px; line-height:1.6; color:#cbd5e1; word-break:break-word; }
    .md-body > *:first-child { margin-top:0; } .md-body > *:last-child { margin-bottom:0; }
    .md-body h1,.md-body h2,.md-body h3,.md-body h4,.md-body h5,.md-body h6 { font-weight:600; color:#e2e8f0; margin:.7em 0 .35em; line-height:1.3; }
    .md-body h1{font-size:1.35em} .md-body h2{font-size:1.2em} .md-body h3{font-size:1.08em} .md-body h4{font-size:1em}
    .md-body p{margin:.4em 0}
    .md-body ul,.md-body ol{margin:.4em 0; padding-left:1.4em}
    .md-body ul{list-style:disc} .md-body ol{list-style:decimal} .md-body li{margin:.15em 0}
    .md-body code{background:#1e293b; border:1px solid #334155; border-radius:4px; padding:.05em .35em; font-size:.9em; font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .md-body pre{background:#0f172a; border:1px solid #334155; border-radius:6px; padding:.6em .8em; overflow:auto; margin:.5em 0}
    .md-body pre code{background:none; border:none; padding:0; font-size:.85em}
    .md-body a{color:#818cf8; text-decoration:underline}
    .md-body blockquote{border-left:3px solid #475569; padding:.1em .8em; margin:.5em 0; color:#94a3b8}
    .md-body table{border-collapse:collapse; margin:.5em 0; display:block; overflow-x:auto; max-width:100%}
    .md-body th,.md-body td{border:1px solid #334155; padding:.3em .6em; text-align:left; white-space:nowrap}
    .md-body th{background:#1e293b; font-weight:600; color:#e2e8f0}
    .md-body hr{border:none; border-top:1px solid #334155; margin:.8em 0}
    .md-body img{max-width:100%; border-radius:4px}
    .md-body sub,.md-body sup{color:#94a3b8; font-size:.8em}
    .md-body strong{color:#e2e8f0; font-weight:600}
  </style>
</head>
<body>
  <div id="root" class="text-slate-100"></div>

  <script type="text/babel">
const { useState, useEffect, useCallback } = React;

const api = {
  async get(p) { const r = await fetch(p); return r.json(); },
  async post(p, body) {
    const r = await fetch(p, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body || {}) });
    return r.json();
  },
  async del(p) { const r = await fetch(p, { method: "DELETE" }); return r.json(); },
};

function Section({ title, children, right, collapsible, defaultOpen = false }) {
  const [open, setOpen] = useState(collapsible ? defaultOpen : true);
  const shown = !collapsible || open;
  return (
    <div className="bg-slate-900/70 border border-slate-700 rounded-xl p-5 mb-5">
      <div className={`flex items-center justify-between ${shown ? "mb-4" : ""}`}>
        <h2 className={`text-lg font-semibold ${collapsible ? "cursor-pointer select-none" : ""}`}
          onClick={collapsible ? () => setOpen((o) => !o) : undefined}>
          {collapsible && <span className="inline-block w-4 text-slate-500">{open ? "▾" : "▸"}</span>}
          {title}
        </h2>
        {shown && right}
      </div>
      {shown && children}
    </div>
  );
}

// 'i' 버튼: 클릭하면 해당 입력 항목 설명 모달을 띄운다(포털로 body 에 렌더).
function InfoTip({ text, title }) {
  const [open, setOpen] = useState(false);
  const modal = open ? ReactDOM.createPortal(
    <div className="fixed inset-0 z-[60] bg-black/60 flex items-center justify-center p-4" onClick={() => setOpen(false)}>
      <div className="bg-slate-900 border border-slate-700 rounded-xl max-w-md w-full p-5 shadow-2xl" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-2">
          <h3 className="text-sm font-semibold text-indigo-300">{title || "입력 안내"}</h3>
          <button onClick={() => setOpen(false)} className="w-7 h-7 flex items-center justify-center rounded-lg text-slate-400 border border-slate-600 hover:text-rose-300 hover:border-rose-500/50 transition">✕</button>
        </div>
        <div className="text-sm text-slate-200 leading-relaxed whitespace-pre-line">{text}</div>
      </div>
    </div>, document.body) : null;
  return (
    <span className="inline-block ml-1 align-middle">
      <button type="button" title="설명 보기" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setOpen(true); }}
        className="inline-flex items-center justify-center w-4 h-4 rounded-full bg-slate-600 hover:bg-indigo-500 text-slate-100 text-[10px] font-bold cursor-pointer">i</button>
      {modal}
    </span>
  );
}

function Field({ label, value, onChange, type = "text", placeholder, info }) {
  return (
    <label className="block mb-3">
      <span className="text-sm text-slate-400">{label}{info && <InfoTip text={info} title={label} />}</span>
      <input
        type={type} value={value || ""} placeholder={placeholder}
        onChange={(e) => onChange(e.target.value)}
        className="mt-1 w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-400"
      />
    </label>
  );
}

function Btn({ children, onClick, color = "indigo", disabled }) {
  const colors = {
    indigo: "bg-indigo-600 hover:bg-indigo-500",
    green: "bg-emerald-600 hover:bg-emerald-500",
    red: "bg-rose-600 hover:bg-rose-500",
    slate: "bg-slate-700 hover:bg-slate-600",
    violet: "bg-violet-600 hover:bg-violet-500",
  };
  return (
    <button onClick={onClick} disabled={disabled}
      className={`${colors[color]} disabled:opacity-40 text-white text-sm font-medium px-4 py-2 rounded-lg transition`}>
      {children}
    </button>
  );
}

const stageBadge = {
  "plan-ready": ["질문 대기", "bg-sky-500/20 text-sky-300 border-sky-500/40"],
  "awaiting-answer": ["답변 대기", "bg-violet-500/20 text-violet-300 border-violet-500/40"],
  "build-ready": ["개발 대기", "bg-amber-500/20 text-amber-300 border-amber-500/40"],
  "await-merge": ["병합 대기", "bg-teal-500/20 text-teal-300 border-teal-500/40"],
  "processing": ["처리 중", "bg-indigo-500/20 text-indigo-300 border-indigo-500/40 animate-pulse"],
  "failed": ["실패", "bg-rose-500/20 text-rose-300 border-rose-500/40"],
  "done": ["완료", "bg-emerald-500/20 text-emerald-300 border-emerald-500/40"],
};
const resultBadge = {
  "success": ["성공", "bg-emerald-500/20 text-emerald-300 border-emerald-500/40"],
  "skip": ["스킵(답변대기)", "bg-slate-500/20 text-slate-300 border-slate-500/40"],
  "skip-idempotent": ["스킵(중복방지)", "bg-sky-500/20 text-sky-300 border-sky-500/40"],
  "incomplete": ["미완료(PR없음·재시도)", "bg-amber-500/20 text-amber-300 border-amber-500/40"],
  "rework": ["리뷰 반영(PR 갱신)", "bg-cyan-500/20 text-cyan-300 border-cyan-500/40"],
  "reviewed": ["리뷰 진행", "bg-violet-500/20 text-violet-300 border-violet-500/40"],
  "approved": ["리뷰 승인", "bg-emerald-500/20 text-emerald-300 border-emerald-500/40"],
  "merged": ["병합 완료", "bg-emerald-500/20 text-emerald-300 border-emerald-500/40"],
  "stopped": ["중지됨", "bg-slate-500/20 text-slate-300 border-slate-500/40"],
  "failed": ["실패", "bg-rose-500/20 text-rose-300 border-rose-500/40"],
};

// 마크다운(GFM) 렌더 — PR 리뷰/코멘트 본문을 GitHub 처럼 표·제목·코드로 표시(DOMPurify 로 정제).
function Markdown({ text }) {
  const src = String(text || "");
  if (typeof window.marked === "undefined" || typeof window.DOMPurify === "undefined") {
    return <div className="whitespace-pre-wrap text-slate-200">{src}</div>;   // 라이브러리 미로드 시 폴백
  }
  let html = window.DOMPurify.sanitize(window.marked.parse(src, { gfm: true, breaks: true }), { ADD_ATTR: ["target"] });
  html = html.replace(/<a /g, '<a target="_blank" rel="noreferrer" ');   // 링크는 새 탭
  return <div className="md-body" dangerouslySetInnerHTML={{ __html: html }} />;
}

// ADF 세그먼트(text/image) 렌더 — 카드 이미지는 백엔드 프록시(/api/.../attachment/:id)로 표시
function RichBody({ segments, fallback, cardKey, pid }) {
  if (!segments || !segments.length) return <span className="whitespace-pre-wrap">{fallback || "(없음)"}</span>;
  const src = (id) => `/api/jira/issue/${cardKey}/attachment/${id}?project=${encodeURIComponent(pid)}`;
  return (
    <React.Fragment>
      {segments.map((s, i) => {
        if (s.type === "image") {
          const url = s.url || src(s.id); // 외부 미디어는 원본 URL, 첨부는 백엔드 프록시
          return (
            <a key={i} href={url} target="_blank" rel="noreferrer" title={s.filename}>
              <img src={url} alt={s.filename} loading="lazy" className="my-1 max-w-full max-h-80 rounded border border-slate-600 block" />
            </a>
          );
        }
        if (s.type === "unavailable") {
          return (
            <span key={i} className="my-1 inline-flex items-center gap-1 rounded border border-amber-500/40 bg-amber-500/10 px-2 py-1 text-xs text-amber-300" title="첨부로 업로드되지 않은 인라인 이미지라 대시보드에서 가져올 수 없습니다. Jira에서 확인하세요.">
              🖼 인라인 이미지(첨부 아님) — 표시 불가, Jira에서 확인
            </span>
          );
        }
        return <span key={i} className="whitespace-pre-wrap">{s.text}</span>;
      })}
    </React.Fragment>
  );
}

// 실행에 필요한 설치 요소·리소스 안내 모달
function InfoModal({ onClose }) {
  const H = ({ children }) => <h3 className="text-sm font-semibold text-indigo-300 mt-4 mb-1">{children}</h3>;
  const Li = ({ children }) => <li className="text-sm text-slate-300 leading-relaxed">{children}</li>;
  const Code = ({ children }) => <code className="bg-slate-800 border border-slate-700 rounded px-1 py-0.5 text-xs">{children}</code>;
  return (
    <div className="fixed inset-0 z-50 bg-black/60 flex items-start justify-center p-4 overflow-auto" onClick={onClose}>
      <div className="bg-slate-900 border border-slate-700 rounded-xl max-w-2xl w-full p-6 my-8 shadow-2xl" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-2">
          <h2 className="text-lg font-semibold">실행에 필요한 설치 요소 · 리소스</h2>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 border border-slate-600 hover:text-rose-300 hover:border-rose-500/50 hover:bg-rose-500/10 transition">✕</button>
        </div>
        <p className="text-xs text-slate-500 mb-2">이 대시보드는 로컬 전용입니다. 토큰은 외부로 전송되지 않습니다.</p>

        <H>① 필수 설치 (런타임 · CLI)</H>
        <ul className="list-disc pl-5 space-y-1">
          <Li><b>Node.js ≥ 18</b> — 대시보드 서버 + 루프 순회(run-cycle) + claude 실행 전사 렌더러</Li>
          <Li><b>Claude Code CLI</b>(<Code>claude</Code>) — 설치+로그인, 그리고 <Code>claude mcp add atlassian</Code> 인증(루프 내 Jira 코멘트/상태 작업)</Li>
          <Li><b>GitHub CLI</b>(<Code>gh</Code>) — <Code>gh auth login</Code> (repo clone/push/PR)</Li>
          <Li><b>git</b> — 대상 repo clone/커밋</Li>
        </ul>

        <H>② 자격증명 (프로젝트별 · 자격증명 섹션에서 입력)</H>
        <ul className="list-disc pl-5 space-y-1">
          <Li><b>Atlassian 이메일 + API 토큰</b> — 카드 조회·탐지·등록·답변(필수). <Code>id.atlassian.com</Code> 에서 발급</Li>
          <Li><b>Anthropic API Key</b> — 루프 내 claude 인증(없으면 로컬 claude 로그인 폴백)</Li>
          <Li><b>GitHub Token</b> — clone/push/PR(없으면 로컬 gh auth 폴백, repo 쓰기 권한 필요)</Li>
          <Li><b>Slack Webhook</b> — 처리 완료/실패 알림(선택)</Li>
        </ul>

        <H>③ 실행 방법</H>
        <ul className="list-disc pl-5 space-y-1">
          <Li><Code>cd dashboard && npm install</Code> 후 <Code>npm run dev</Code>(핫리로드) 또는 <Code>npm start</Code></Li>
          <Li>프로젝트 추가 → 자격증명·Git Repositories·(.env) 설정 → 루프 "시작" 또는 카드 "지금 실행"</Li>
        </ul>

        <H>④ 생성·사용 리소스 (로컬, git 제외)</H>
        <ul className="list-disc pl-5 space-y-1">
          <Li><Code>projects.json</Code> / <Code>project-credentials.json</Code> — 프로젝트 설정·토큰(권한 600)</Li>
          <Li><Code>work-*.env</Code> — repo로 복사할 env, <Code>repos/</Code> — 카드별 clone</Li>
          <Li><Code>loop-*.log</Code> / <Code>history.jsonl</Code> / <Code>claude-logs/</Code> — 로그·이력, <Code>loop-*.pid/.ver</Code> — 루프 상태</Li>
        </ul>

        <H>⑤ 동작 흐름</H>
        <p className="text-sm text-slate-300 leading-relaxed">plan(질문 코멘트+claude-planned) → 담당자 답변+claude-answered → build(개발·테스트·PR·완료요약·상태전환). 루프가 주기마다 모든 프로젝트를 순회하며, 단건/전체 즉시 실행과 PR 리뷰 반영(rework)도 지원합니다.</p>

        <div className="mt-5 text-right"><Btn onClick={onClose}>닫기</Btn></div>
      </div>
    </div>
  );
}

// =================== 프로젝트 1개 (설정·자격증명·.env·카드 등록·카드 상태) ===================
function ProjectCard({ proj, onDeleted, flash }) {
  const PID = proj.id;
  const withP = (url) => url + (url.includes("?") ? "&" : "?") + "project=" + encodeURIComponent(PID);

  const [config, setConfig] = useState(proj);
  const [creds, setCreds] = useState({});
  const [credInput, setCredInput] = useState({ anthropicApiKey: "", githubToken: "", atlassianEmail: "", atlassianToken: "", slackWebhookUrl: "" });
  const [jiraMeta, setJiraMeta] = useState({ issueTypes: [], epics: [], loaded: false, err: "" });
  const [newCard, setNewCard] = useState({ issueType: "", summary: "", description: "", epicKey: "", parentInput: "", addTriggerLabel: true, assignSelf: true, attachments: [], repos: [], env: "" });
  const [creating, setCreating] = useState(false);
  const [refining, setRefining] = useState(false);
  const [cards, setCards] = useState([]);
  const [cardsErr, setCardsErr] = useState("");
  const [expandedKey, setExpandedKey] = useState("");
  const [cardPage, setCardPage] = useState(0);   // 카드 상태 페이지네이션(최신 작성 먼저)
  const [cardQuery, setCardQuery] = useState(""); // 카드 검색(티켓 이름/번호/상태)
  const [cardHistory, setCardHistory] = useState(null);  // 펼친 카드의 작업 이력 { key, entries }
  const [detail, setDetail] = useState(null);
  const [detailLoading, setDetailLoading] = useState(false);
  const [reply, setReply] = useState("");
  const [replyAnswered, setReplyAnswered] = useState(true);
  const [replyTarget, setReplyTarget] = useState(null);
  const [posting, setPosting] = useState(false);
  const [claudeLog, setClaudeLog] = useState(null);
  const [repoEnv, setRepoEnv] = useState({ repo: "", content: "" });
  const [reworkMemo, setReworkMemo] = useState("");
  const [reviews, setReviews] = useState(null);   // { key, loading, prs:[...] } — PR 리뷰 내용
  const [prs, setPrs] = useState(null);           // { key, loading, list:[...], botLogin } — 카드 1:N PR 목록

  const credSet = (k) => creds[k] === true;
  const openRepoEnv = async (name) => {
    setRepoEnv({ repo: name, content: "불러오는 중…" });
    const r = await api.get(withP(`/api/env?repo=${encodeURIComponent(name)}`));
    setRepoEnv((p) => p.repo === name ? { repo: name, content: r.ok ? r.content : "" } : p);
  };
  const saveRepoEnv = async (name) => {
    const r = await api.post(withP(`/api/env?repo=${encodeURIComponent(name)}`), { content: repoEnv.content });
    flash(r.ok ? `${name} env 저장됨` : (r.message || "저장 실패"));
  };

  const loadCreds = async () => {
    const c = await api.get(`/api/projects/${PID}/credentials`);
    setCreds(c); setCredInput((p) => ({ ...p, atlassianEmail: c.atlassianEmail || "" }));
  };
  const loadMeta = async () => {
    const r = await api.get(withP("/api/jira/meta"));
    if (r.ok) { setJiraMeta({ issueTypes: r.issueTypes || [], epics: r.epics || [], loaded: true, err: "" }); setNewCard((p) => p.issueType ? p : { ...p, issueType: (r.issueTypes.find((t) => t.name === "Task") || r.issueTypes[0] || {}).name || "" }); }
    else setJiraMeta({ issueTypes: [], epics: [], loaded: true, err: r.message || "메타 조회 실패" });
  };
  useEffect(() => { loadCreds(); loadMeta(); }, []);
  // 카드 상태 자동 갱신: 마운트 시 1회 + 60초마다(프로젝트 키 있을 때만). 수동 "조회"도 그대로 사용 가능.
  useEffect(() => {
    if (!proj.projectKey) return;
    loadCards();
    const t = setInterval(loadCards, 60000);
    return () => clearInterval(t);
  }, []);
  useEffect(() => {
    if (!claudeLog) return;
    const key = claudeLog.key, phase = claudeLog.phase;
    const t = setInterval(async () => { const r = await api.get(withP(`/api/claude-log/${key}/${phase}?lines=600`)); if (r.ok) setClaudeLog((p) => (p && p.key === key && p.phase === phase) ? { ...p, text: r.log } : p); }, 3000);
    return () => clearInterval(t);
  }, [claudeLog && claudeLog.key, claudeLog && claudeLog.phase]);

  const saveConfig = async () => { const r = await api.post("/api/projects", { ...config, id: PID }); if (r.ok) { setConfig(r.project); flash("설정 저장됨"); } };
  const saveCreds = async () => {
    await api.post(`/api/projects/${PID}/credentials`, credInput);
    setCredInput((p) => ({ ...p, anthropicApiKey: "", githubToken: "", atlassianToken: "", slackWebhookUrl: "" }));
    loadCreds(); flash("자격증명 저장됨");
  };
  const refineDesc = async () => {
    if (!newCard.description.trim()) { flash("정리할 설명을 먼저 입력하세요"); return; }
    setRefining(true);
    const r = await api.post("/api/ai/refine-description", { text: newCard.description, summary: newCard.summary, project: PID });
    setRefining(false);
    if (r.ok) { setNewCard((p) => ({ ...p, description: r.description })); flash("Claude가 설명을 정리했습니다"); } else flash(r.message || "변환 실패");
  };
  const pickImages = (fileList) => {
    const files = Array.from(fileList || []); if (!files.length) return;
    Promise.all(files.map((f) => new Promise((resolve) => { const rd = new FileReader(); rd.onload = () => resolve({ filename: f.name, contentType: f.type || "application/octet-stream", dataBase64: rd.result }); rd.readAsDataURL(f); })))
      .then((arr) => setNewCard((p) => ({ ...p, attachments: [...p.attachments, ...arr] })));
  };
  const removeAttachment = (i) => setNewCard((p) => ({ ...p, attachments: p.attachments.filter((_, idx) => idx !== i) }));
  const toggleRepo = (name, on) => setNewCard((p) => ({ ...p, repos: on ? [...p.repos, name] : p.repos.filter((x) => x !== name) }));
  const createCard = async () => {
    if (!newCard.summary.trim()) { flash("요약을 입력하세요"); return; }
    setCreating(true);
    const r = await api.post("/api/jira/issue", { summary: newCard.summary, description: newCard.description, issueType: newCard.issueType, parentKey: newCard.parentInput.trim() || newCard.epicKey, addTriggerLabel: newCard.addTriggerLabel, assignSelf: newCard.assignSelf, attachments: newCard.attachments, repos: newCard.repos, env: newCard.env, project: PID });
    setCreating(false);
    if (r.ok) { let m = `카드 생성됨: ${r.key}`; if (r.note) m += ` · ${r.note}`; if (r.attached?.length) m += ` · 첨부 ${r.attached.length}`; if (r.attachErrors?.length) m += ` · 첨부실패 ${r.attachErrors.length}`; flash(m); setNewCard((p) => ({ ...p, summary: "", description: "", parentInput: "", attachments: [], repos: [], env: "" })); loadCards(); }
    else flash(r.message || "생성 실패");
  };
  const loadCards = async () => { const r = await api.get(withP("/api/cards")); if (r.ok) { setCards(r.issues); setCardsErr(""); } else setCardsErr(r.message || "조회 실패"); };
  const toggleCard = async (key) => {
    if (expandedKey === key) { setExpandedKey(""); setDetail(null); setCardHistory(null); return; }
    setExpandedKey(key); setDetail(null); setCardHistory(null); setReply(""); setReplyAnswered(true); setReplyTarget(null); setClaudeLog(null); setDetailLoading(true);
    const r = await api.get(withP(`/api/jira/issue/${key}`)); setDetailLoading(false); setDetail(r.ok ? r : { error: r.message || "조회 실패" });
    try { const h = await api.get(withP(`/api/history?limit=1000`)); setCardHistory({ key, entries: h.ok ? (h.entries || []).filter((e) => e.key === key) : [] }); } catch { setCardHistory({ key, entries: [] }); }
  };
  const postReply = async () => {
    if (!reply.trim()) { flash("답변 내용을 입력하세요"); return; }
    setPosting(true);
    const r = await api.post(`/api/jira/issue/${expandedKey}/comment`, { body: reply, markAnswered: replyAnswered, replyTo: replyTarget || undefined, project: PID });
    setPosting(false);
    if (r.ok) { flash("답변 등록됨" + (replyAnswered ? " (claude-answered)" : "")); setReply(""); setReplyTarget(null); const d = await api.get(withP(`/api/jira/issue/${expandedKey}`)); if (d.ok) setDetail(d); loadCards(); }
    else flash(r.message || "등록 실패");
  };
  const runCardNow = async (key, phase) => { const r = await api.post(`/api/cards/${key}/run`, { phase, project: PID }); flash(r.ok ? `${key} ${phase} 즉시 실행 — Claude 실행 로그 확인` : (r.message || "실패")); if (r.ok) showClaudeLog(key, phase); };
  const stopCard = async (key) => { const r = await api.post(`/api/cards/${key}/stop`, { project: PID }); flash(r.ok ? `${key} ${r.message}` : (r.message || "중지 실패")); loadCards(); };
  const reworkCard = async (key) => {
    const r = await api.post(`/api/cards/${key}/run`, { phase: "build", rework: true, memo: reworkMemo, project: PID });
    flash(r.ok ? `${key} 리뷰 반영 시작 — 기존 PR 갱신(로그 확인)` : (r.message || "실패"));
    if (r.ok) { setReworkMemo(""); showClaudeLog(key, "build"); }
  };
  const reworkThenReview = async (key) => {
    const r = await api.post(`/api/cards/${key}/run`, { phase: "build", rework: true, reviewAfter: true, memo: reworkMemo, project: PID });
    flash(r.ok ? `${key} 리뷰 반영 → 완료 후 재리뷰 진행(로그 확인)` : (r.message || "실패"));
    if (r.ok) { setReworkMemo(""); showClaudeLog(key, "build"); }
  };
  const setCardRepos = async (key, repos) => {
    // 낙관적 갱신: Jira JQL 검색 인덱싱 지연으로 재조회가 늦으므로 로컬 라벨을 즉시 반영
    setCards((cs) => cs.map((c) => c.key === key
      ? { ...c, labels: [...(c.labels || []).filter((l) => l.indexOf("repo_") !== 0), ...repos.map((n) => "repo_" + n)] }
      : c));
    const r = await api.post(`/api/cards/${key}/repos`, { repos, project: PID });
    flash(r.ok ? `${key} 대상 repo: ${repos.join(", ") || "(없음)"}` : (r.message || "실패"));
    if (!r.ok) loadCards();   // 실패 시 서버 상태로 되돌림
  };
  const mergeCard = async (key) => {
    if (!window.confirm(`${key} 의 '자동화 PR' 을 rebase merge 하고, 자동화 PR 이 모두 병합되면 카드를 완료 처리할까요?\n(사람이 만든 PR 은 건드리지 않습니다. 완료 시 clone 디렉토리도 삭제)`)) return;
    const r = await api.post(`/api/cards/${key}/merge`, { project: PID });
    if (r.ok) flash(`${key} 병합 ${r.merged}건${r.doneStatus ? ` · 완료(${r.doneStatus})` : ""}${r.removed?.length ? ` · clone ${r.removed.length}개 정리` : ""}${r.errors?.length ? ` · 경고 ${r.errors.length}` : ""}`);
    else flash(r.message || (r.errors?.length ? r.errors[0] : "병합 실패(열린 자동화 PR 없음/충돌/권한 확인)"));
    if (prs && prs.key === key) loadPrs(key);
    loadCards();
  };
  const loadPrs = async (key) => {
    setPrs({ key, loading: true, list: [], botLogin: "" });
    const r = await api.get(withP(`/api/cards/${key}/prs`));
    setPrs((p) => (p && p.key === key) ? { key, loading: false, list: r.ok ? (r.prs || []) : [], botLogin: r.botLogin || "", err: r.ok ? "" : (r.message || "조회 실패") } : p);
  };
  const mergeOnePr = async (key, pr) => {
    if (!window.confirm(`${pr.repo} #${pr.number} (${pr.isBot ? "자동화" : "사람"} @${pr.author}) 을(를) rebase merge 할까요?`)) return;
    const r = await api.post(`/api/cards/${key}/merge`, { owner: pr.owner, number: pr.number, project: PID });
    if (r.ok) flash(`#${pr.number} 병합${r.doneStatus ? ` · 카드 완료(${r.doneStatus})` : ""}${r.removed?.length ? ` · clone 정리` : ""}`);
    else flash(r.message || (r.errors?.length ? r.errors[0] : "병합 실패"));
    loadPrs(key); loadCards();
  };
  const reviewOnePr = async (key, pr) => {
    const r = await api.post(`/api/cards/${key}/run`, { phase: "review", reviewOwner: pr.owner, reviewNumber: pr.number, project: PID });
    flash(r.ok ? `#${pr.number} 리뷰 실행 — Claude 실행 로그(review) 확인` : (r.message || "실패"));
    if (r.ok) showClaudeLog(key, "review");
  };
  const showClaudeLog = async (key, phase) => { setClaudeLog({ key, phase, text: "불러오는 중…" }); const r = await api.get(withP(`/api/claude-log/${key}/${phase}?lines=600`)); setClaudeLog((p) => (p && p.key === key && p.phase === phase) ? { ...p, text: r.ok ? r.log : (r.message || "조회 실패") } : p); };
  const loadReviews = async (key) => {
    setReviews({ key, loading: true, prs: [] });
    const r = await api.get(withP(`/api/cards/${key}/reviews`));
    setReviews((p) => (p && p.key === key) ? { key, loading: false, prs: r.ok ? (r.prs || []) : [], err: r.ok ? "" : (r.message || "조회 실패") } : p);
  };
  const del = async () => { if (!window.confirm(`프로젝트 '${config.name || PID}' 를 삭제할까요? (설정/자격증명만 제거, Jira/repo 는 영향 없음)`)) return; await api.del(`/api/projects/${PID}`); onDeleted(); };

  const title = <span>📁 {config.name || PID} <span className="text-xs text-slate-500">({config.projectKey || "프로젝트 키 미설정"})</span></span>;

  return (
    <Section title={title} collapsible right={<div className="flex gap-2"><Btn onClick={saveConfig}>설정 저장</Btn><Btn color="red" onClick={del}>삭제</Btn></div>}>
      {/* 설정 */}
      <div className="grid grid-cols-2 gap-x-5">
        <Field label="프로젝트 이름" value={config.name} onChange={(v) => setConfig({ ...config, name: v })} placeholder="표시 이름"
          info={"대시보드에 표시할 프로젝트 이름입니다.\n\n내부 식별자(id)는 이 이름에서 자동 생성됩니다. 여러 Jira 프로젝트를 각각 등록해 함께 운영할 수 있습니다."} />
        <Field label="Jira 사이트" value={config.jiraSite} onChange={(v) => setConfig({ ...config, jiraSite: v })} placeholder="xxx.atlassian.net"
          info={"Atlassian(Jira) 도메인입니다. 예: yourcompany.atlassian.net\n\n앞의 https:// 없이 도메인만 입력하세요. 카드 조회·상태 전환·완료 내역 기록에 사용됩니다."} />
        <Field label="프로젝트 키 (workspace)" value={config.projectKey} onChange={(v) => setConfig({ ...config, projectKey: v })} placeholder="PROJ"
          info={"Jira 프로젝트 키입니다. 카드 키의 접두사예요. 예: EKYB, FSIF (카드 EKYB-722의 'EKYB').\n\n지정하면 탐지 JQL에 'project = 키' 필터가 붙어 그 프로젝트 카드만 대상이 됩니다. 비우면 프로젝트 필터 없이 담당자·트리거 조건만으로 탐지합니다."} />
        <Field label="담당자 이메일" value={config.assigneeEmail} onChange={(v) => setConfig({ ...config, assigneeEmail: v })}
          info={"자동화 대상 카드의 담당자(assignee) 이메일입니다.\n\nplan/build 프롬프트에서 '이 카드가 담당자에게 할당됐는지' 확인과, 실패 시 담당자 멘션에 사용됩니다. Jira 로그인 이메일과 동일하게 입력하세요."} />
        <Field label="담당자 이름" value={config.assigneeName} onChange={(v) => setConfig({ ...config, assigneeName: v })}
          info={"카드 담당자의 표시 이름입니다. 예: 홍길동(Gil-dong)\n\nplan 단계 질문 코멘트·리뷰 반영·실패 코멘트에서 담당자를 멘션/지칭할 때 사용됩니다."} />
        <label className="block mb-3">
          <span className="text-sm text-slate-400">트리거 방식<InfoTip title="트리거 방식" text={"어떤 신호로 '자동화 대상 카드'를 판정할지 정합니다.\n\n• 라벨(권장): 아래 '트리거 라벨'이 붙은 카드만 대상. 정확하고 안전합니다.\n• 텍스트(레거시): 카드 설명에 '트리거 텍스트'가 포함된 카드를 대상."} /></span>
          <select value={config.triggerMode || "label"} onChange={(e) => setConfig({ ...config, triggerMode: e.target.value })}
            className="mt-1 w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-400">
            <option value="label">라벨 (권장)</option><option value="text">텍스트 (레거시)</option>
          </select>
        </label>
        {config.triggerMode === "text"
          ? <Field label="트리거 텍스트" value={config.triggerText} onChange={(v) => setConfig({ ...config, triggerText: v })}
              info={"text 모드에서 자동화 대상을 판정하는 키워드입니다.\n\n카드 설명(본문)에 이 텍스트가 포함되면 대상으로 탐지합니다. 예: claude-work"} />
          : <Field label="트리거 라벨" value={config.triggerLabel} onChange={(v) => setConfig({ ...config, triggerLabel: v })} placeholder="claude-work"
              info={"label 모드에서 자동화 대상을 표시하는 Jira 라벨입니다. 기본: claude-work\n\n이 라벨이 붙은 카드만 plan/build 대상으로 탐지합니다. Jira에서 카드에 이 라벨을 달아 자동화를 시작하세요."} />}
        <Field label="완료 상태명(쉼표로 복수 지정)" value={config.doneStatus} onChange={(v) => setConfig({ ...config, doneStatus: v })} placeholder="DEV COMPLETED, Done"
          info={"완료로 인식할 Jira 상태명입니다. 쉼표로 여러 개 지정할 수 있어요. 예: DEV COMPLETED, Done, QA COMPLETED\n\n• 전체: 이 상태의 카드는 탐지에서 제외되고 '완료'로 표시됩니다.\n• 첫 번째 값: 대시보드에서 PR 병합 시 카드를 전환할 '주 완료 상태'입니다."} />
        <Field label="plan 라벨" value={config.plannedLabel} onChange={(v) => setConfig({ ...config, plannedLabel: v })}
          info={"plan 단계가 끝난 카드에 붙는 라벨입니다. 기본: claude-planned\n\n같은 카드를 plan에서 중복 처리하지 않게 하고, build 진입 게이트(planned+answered)의 한 조건이 됩니다. 보통 기본값 그대로 두세요."} />
        <Field label="주기(초)" type="number" value={config.intervalSeconds} onChange={(v) => setConfig({ ...config, intervalSeconds: parseInt(v || "3600", 10) })}
          info={"plan/build 루프의 실행 주기(초)입니다. 기본 3600(1시간).\n\n루프는 이 주기마다 등록된 모든 프로젝트를 순회하며 대상 카드를 탐지·처리합니다."} />
        <Field label="review 주기(초)" type="number" value={config.reviewIntervalSeconds} onChange={(v) => setConfig({ ...config, reviewIntervalSeconds: parseInt(v || "3600", 10) })} placeholder="3600"
          info={"review 루프(PR 자동 리뷰)의 실행 주기(초)입니다. 기본 3600.\n\nreview 루프는 자동화가 올린 build PR을 이 주기마다 점검해, 문제없으면 승인 마커 코멘트를 남깁니다."} />
        <Field label="동시 처리 상한 (병렬)" type="number" value={config.maxParallel} onChange={(v) => setConfig({ ...config, maxParallel: parseInt(v || "3", 10) })} placeholder="3"
          info={"한 사이클에서 동시에 처리할 카드 수의 상한입니다. 기본 3.\n\n너무 크게 잡으면 API/자원 부담이 커지고, 작게 잡으면 처리 대기가 늘어납니다."} />
        <Field label="clone 베이스 폴더" value={config.cloneBase} onChange={(v) => setConfig({ ...config, cloneBase: v })} placeholder="/path/to/repos"
          info={"카드별 repo clone과 실행 상태(.state)가 저장되는 폴더의 절대 경로입니다.\n\n각 repo는 이 아래에 '<repo이름>-<카드키>' 디렉토리로 clone됩니다. 병합 완료 시 해당 clone은 자동 삭제됩니다."} />
        <Field label="테스트 명령 (비우면 자동 감지)" value={config.testCmd} onChange={(v) => setConfig({ ...config, testCmd: v })} placeholder="예: npm test"
          info={"PR 생성 전 검증에 사용할 테스트 명령입니다.\n\n비우면 claude가 프로젝트를 보고 자동 감지합니다(go test, npm test, pytest, Makefile의 test 등). 테스트가 통과할 때까지 수정을 반복하고, 통과 후에만 PR을 만듭니다."} />
        <Field label="빌드 명령 (비우면 자동 감지)" value={config.buildCmd} onChange={(v) => setConfig({ ...config, buildCmd: v })} placeholder="예: npm run build"
          info={"테스트 수단이 없을 때 대신 시도할 빌드/컴파일 명령입니다.\n\n비우면 자동 감지(npm run build, tsc, go build, make 등). 빌드 수단도 없으면 이 검증 단계는 건너뜁니다."} />
      </div>
      <p className="text-xs text-slate-500 mt-1">PR 전 검증: 테스트가 있으면 통과까지 수정, 없으면 빌드만 시도. 설정 변경 후 "설정 저장".</p>

      {/* Git Repositories (여러 개) */}
      <div className="mt-4 pt-4 border-t border-slate-700">
        <div className="flex items-center justify-between mb-2">
          <span className="text-sm font-medium text-slate-300">Git Repositories ({(config.repos || []).length})</span>
          <Btn color="slate" onClick={() => setConfig({ ...config, repos: [...(config.repos || []), { name: "", url: "", baseBranch: "main" }] })}>+ repo 추가</Btn>
        </div>
        {(config.repos || []).length === 0 && <p className="text-amber-300/80 text-sm mb-2">repo 를 1개 이상 추가하세요. 카드 생성 시 대상 repo 로 선택됩니다.</p>}
        {(config.repos || []).map((r, i) => {
          const upd = (k, v) => setConfig({ ...config, repos: config.repos.map((x, idx) => idx === i ? { ...x, [k]: v } : x) });
          const envOpen = repoEnv.repo === r.name;
          return (
            <div key={i} className="mb-2">
              <div className="grid grid-cols-12 gap-2 items-center">
                <input value={r.name || ""} onChange={(e) => upd("name", e.target.value)} placeholder="name(라벨용)" className="col-span-3 bg-slate-800 border border-slate-600 rounded-lg px-2 py-1.5 text-sm" />
                <input value={r.url || ""} onChange={(e) => upd("url", e.target.value)} placeholder="https://github.com/Org/repo.git" className="col-span-4 bg-slate-800 border border-slate-600 rounded-lg px-2 py-1.5 text-sm" />
                <input value={r.baseBranch || ""} onChange={(e) => upd("baseBranch", e.target.value)} placeholder="base" className="col-span-1 bg-slate-800 border border-slate-600 rounded-lg px-2 py-1.5 text-sm" />
                <input value={r.envDest || ""} onChange={(e) => upd("envDest", e.target.value)} placeholder="env 대상경로 (예: src/main/resources/application-private.properties)" title={r.envDest || ""} className="col-span-2 bg-slate-800 border border-slate-600 rounded-lg px-2 py-1.5 text-sm" />
                <div className="col-span-2 flex gap-1.5 justify-end items-center">
                  <button onClick={() => r.name ? openRepoEnv(r.name) : flash("name 먼저 입력")} title="이 repo 의 .env 편집"
                    className={`inline-flex items-center gap-1 text-xs font-medium px-2.5 py-1.5 rounded-lg border transition ${envOpen ? "bg-indigo-600 text-white border-indigo-500" : "bg-indigo-500/15 text-indigo-300 border-indigo-500/40 hover:bg-indigo-500/30"}`}>
                    <span>🔑</span> env
                  </button>
                  <button onClick={() => setConfig({ ...config, repos: config.repos.filter((_, idx) => idx !== i) })} title="repo 삭제"
                    className="inline-flex items-center justify-center w-8 h-8 rounded-lg text-slate-400 border border-slate-600 hover:text-rose-300 hover:border-rose-500/50 hover:bg-rose-500/10 transition">✕</button>
                </div>
              </div>
              {envOpen && (
                <div className="mt-1 mb-2 pl-2 border-l-2 border-indigo-500/40">
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-xs text-slate-400">{r.name} 전용 .env (카드 전용 env 가 있으면 그게 우선)</span>
                    <div className="flex gap-2">
                      <Btn color="green" onClick={() => saveRepoEnv(r.name)}>저장</Btn>
                      <button onClick={() => setRepoEnv({ repo: "", content: "" })} className="text-[11px] text-slate-400 hover:text-rose-300">닫기</button>
                    </div>
                  </div>

                            <div className="mb-4 rounded-lg border border-sky-500/30 bg-sky-500/[0.04]">
                              <div className="flex items-center gap-2 px-3 py-2 border-b border-sky-500/20 bg-sky-500/10 rounded-t-lg">
                                <span className="text-[11px] font-semibold text-sky-300 uppercase tracking-wider">📋 Jira 카드</span>
                                <span className="text-[11px] text-slate-500">설명 · 코멘트 · 답변</span>
                              </div>
                              <div className="p-3">
                                <div className="text-xs text-slate-400 mb-1">원문 설명</div>
                                <div className="bg-black/40 border border-slate-700 rounded p-3 text-xs text-slate-200 mb-4 max-h-72 overflow-auto"><RichBody segments={detail.descriptionSegments} fallback={detail.description || "(설명 없음)"} cardKey={detail.key} pid={PID} /></div>
                                <div className="text-xs text-slate-400 mb-1">코멘트 ({detail.comments.length})</div>
                                <div className="space-y-2 mb-4 max-h-72 overflow-auto">
                                  {detail.comments.length === 0 ? <p className="text-slate-500 text-xs">코멘트 없음</p> : detail.comments.map((cm, i) => (
                                    <div key={i} className="bg-slate-800/60 border border-slate-700 rounded p-2">
                                      <div className="flex items-center justify-between mb-1"><span className="text-[11px] text-slate-400">{cm.author} · {cm.created ? new Date(cm.created).toLocaleString() : ""}</span><button onClick={() => setReplyTarget({ author: cm.author, accountId: cm.accountId, snippet: (cm.body || "").slice(0, 280) })} className="text-[11px] text-indigo-400 hover:text-indigo-300">↳ 답글</button></div>
                                      <div className="text-xs text-slate-200"><RichBody segments={cm.bodySegments} fallback={cm.body} cardKey={detail.key} pid={PID} /></div>
                                    </div>
                                  ))}
                                </div>
                                <div className="text-xs text-slate-400 mb-1">답변 작성</div>
                                {replyTarget && <div className="flex items-center justify-between bg-indigo-500/10 border border-indigo-500/30 rounded px-2 py-1 mb-1 text-xs text-indigo-200"><span>↳ <b>{replyTarget.author}</b> 의 코멘트에 답글</span><button onClick={() => setReplyTarget(null)} className="text-slate-400 hover:text-rose-300">취소</button></div>}
                                <textarea value={reply} onChange={(e) => setReply(e.target.value)} spellCheck={false} placeholder="질문에 대한 답변/추가 설계를 적으세요."
                                  className="w-full h-24 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-400" />
                                <div className="flex items-center justify-between mt-2">
                                  <label className="flex items-center gap-2 text-xs text-slate-300 cursor-pointer"><input type="checkbox" checked={replyAnswered} onChange={(e) => setReplyAnswered(e.target.checked)} /><span>답변 완료로 표시 ({config.answeredLabel || "claude-answered"} → build 진행)</span></label>
                                  <Btn color="green" onClick={postReply} disabled={posting}>{posting ? "등록 중…" : "답변 등록"}</Btn>
                                </div>
                              </div>
                            </div>
                            {/* ===== 🔀 Git · PR 작업 영역 (PR 리뷰·리뷰 반영·병합) ===== */}
                            <div className="mb-2 rounded-lg border border-violet-500/30 bg-violet-500/[0.04]">
                              <div className="flex items-center gap-2 px-3 py-2 border-b border-violet-500/20 bg-violet-500/10 rounded-t-lg">
                                <span className="text-[11px] font-semibold text-violet-300 uppercase tracking-wider">🔀 Git · PR 작업</span>
                                <span className="text-[11px] text-slate-500">PR 리뷰 · 리뷰 반영 · 병합</span>
                              </div>
                              <div className="p-3 space-y-3">
                                {/* PR 목록 (카드 1 : PR N) — 자동화/사람 PR 구분 + 개별 액션 */}
                                <div className="p-2 rounded bg-slate-700/20 border border-slate-600/40">
                                  <div className="flex items-center justify-between mb-1">
                                    <span className="text-xs text-slate-300">PR 목록 (카드 1 : PR N)</span>
                                    <Btn color="slate" onClick={() => loadPrs(c.key)}>{prs && prs.key === c.key && prs.loading ? "불러오는 중…" : "PR 불러오기"}</Btn>
                                  </div>
                                  {prs && prs.key === c.key && !prs.loading && (
                                    prs.err ? <p className="text-xs text-rose-300">{prs.err}</p>
                                    : prs.list.length === 0 ? <p className="text-[11px] text-slate-500">이 카드의 PR 이 없습니다.</p>
                                    : (
                                      <div className="space-y-1.5">
                                        {prs.list.map((pr, i) => {
                                          const stCls = pr.state === "MERGED" ? "bg-emerald-500/15 text-emerald-300 border-emerald-500/40" : pr.state === "OPEN" ? "bg-sky-500/15 text-sky-300 border-sky-500/40" : "bg-slate-600/30 text-slate-400 border-slate-600";
                                          return (
                                            <div key={i} className="rounded border border-slate-700 bg-black/20 p-2">
                                              <div className="flex items-center gap-2 flex-wrap">
                                                <a href={pr.url} target="_blank" rel="noreferrer" className="text-xs text-indigo-400 hover:underline">{pr.repo} #{pr.number}</a>
                                                <span className={`text-[10px] px-1.5 py-0.5 rounded-full border ${stCls}`}>{pr.state}{pr.isDraft ? " · DRAFT" : ""}</span>
                                                <span className={`text-[10px] px-1.5 py-0.5 rounded-full border ${pr.isBot ? "bg-violet-500/15 text-violet-300 border-violet-500/40" : "bg-amber-500/15 text-amber-300 border-amber-500/40"}`}>{pr.isBot ? "자동화" : "사람"} @{pr.author || "?"}</span>
                                              </div>
                                              <div className="text-[11px] text-slate-300 mt-0.5 truncate">{pr.title}</div>
                                              <div className="text-[10px] text-slate-500 font-mono truncate">{pr.branch}</div>
                                              <div className="flex gap-2 mt-1">
                                                {pr.state === "OPEN" && <button onClick={() => mergeOnePr(c.key, pr)} className="text-[11px] px-2 py-0.5 rounded border border-teal-500/40 text-teal-300 hover:bg-teal-500/10 transition">이 PR 병합</button>}
                                                <button onClick={() => reviewOnePr(c.key, pr)} className="text-[11px] px-2 py-0.5 rounded border border-violet-500/40 text-violet-300 hover:bg-violet-500/10 transition">이 PR 리뷰</button>
                                                <a href={pr.url} target="_blank" rel="noreferrer" className="text-[11px] px-2 py-0.5 rounded border border-slate-600 text-slate-300 hover:bg-slate-600/20 transition">열기</a>
                                              </div>
                                            </div>
                                          );
                                        })}
                                        <p className="text-[10px] text-slate-500 mt-1">‘자동화’=봇 계정({prs.botLogin || "?"})이 만든 PR. 일괄 ‘PR 병합’·자동 완료·review 루프는 자동화 PR만 대상, 사람 PR은 개별 버튼으로만 처리됩니다.</p>
                                      </div>
                                    )
                                  )}
                                </div>
                                {/* PR 리뷰 내용(GitHub 리뷰·코멘트·인라인) */}
                                <div className="p-2 rounded bg-violet-500/5 border border-violet-500/20">
                                  <div className="flex items-center justify-between mb-1">
                                    <span className="text-xs text-violet-300">PR 리뷰 (GitHub 리뷰·코멘트)</span>
                                    <Btn color="slate" onClick={() => loadReviews(c.key)}>{reviews && reviews.key === c.key && reviews.loading ? "불러오는 중…" : "리뷰 불러오기"}</Btn>
                                  </div>
                                  {reviews && reviews.key === c.key && !reviews.loading && (
                                    reviews.err ? <p className="text-xs text-rose-300">{reviews.err}</p>
                                    : reviews.prs.length === 0 ? <p className="text-xs text-slate-500">이 카드의 PR 이 없거나 리뷰 내용이 없습니다.</p>
                                    : (
                                      <div className="space-y-3 max-h-96 overflow-auto">
                                        {reviews.prs.map((pr, pi) => (
                                          <div key={pi} className="bg-black/30 border border-slate-700 rounded p-2">
                                            <div className="flex items-center justify-between mb-1 gap-2">
                                              <a href={pr.url} target="_blank" rel="noreferrer" className="text-xs text-indigo-400 hover:underline truncate">{pr.repo} #{pr.number} · {pr.title}</a>
                                              <span className="text-[11px] text-slate-400 whitespace-nowrap">{pr.state}{pr.branch ? ` · ${pr.branch}` : ""}</span>
                                            </div>
                                            {(pr.reviews.length + pr.comments.length + pr.inline.length) === 0
                                              ? <p className="text-[11px] text-slate-500">리뷰/코멘트 없음</p>
                                              : (
                                                <div className="space-y-2">
                                                  {pr.reviews.map((rv, i) => (
                                                    <div key={`r${i}`} className="rounded border border-slate-700 bg-slate-800/40 overflow-hidden">
                                                      <div className="flex items-center gap-2 px-2 py-1 bg-slate-800/70 border-b border-slate-700">
                                                        <span className="text-[11px] font-semibold text-slate-300">{rv.author}</span>
                                                        <span className={`text-[10px] px-1.5 py-0.5 rounded-full border ${rv.state === "APPROVED" ? "bg-emerald-500/15 text-emerald-300 border-emerald-500/40" : rv.state === "CHANGES_REQUESTED" ? "bg-rose-500/15 text-rose-300 border-rose-500/40" : "bg-slate-600/30 text-slate-400 border-slate-600"}`}>{(rv.state || "REVIEW").replace(/_/g, " ")}</span>
                                                        <span className="text-[10px] text-slate-500 ml-auto">리뷰</span>
                                                      </div>
                                                      {rv.body ? <div className="px-2 py-1.5"><Markdown text={rv.body} /></div> : null}
                                                    </div>
                                                  ))}
                                                  {pr.inline.map((cm, i) => (
                                                    <div key={`i${i}`} className="rounded border border-slate-700 bg-slate-800/40 overflow-hidden">
                                                      <div className="flex items-center gap-2 px-2 py-1 bg-slate-800/70 border-b border-slate-700">
                                                        <span className="text-[11px] font-semibold text-slate-300">{cm.author}</span>
                                                        <span className="text-[10px] text-slate-500 font-mono truncate">{cm.path}{cm.line ? `:${cm.line}` : ""}</span>
                                                        <span className="text-[10px] text-slate-500 ml-auto whitespace-nowrap">인라인</span>
                                                      </div>
                                                      <div className="px-2 py-1.5"><Markdown text={cm.body} /></div>
                                                    </div>
                                                  ))}
                                                  {pr.comments.map((cm, i) => (
                                                    <div key={`c${i}`} className="rounded border border-slate-700 bg-slate-800/40 overflow-hidden">
                                                      <div className="flex items-center gap-2 px-2 py-1 bg-slate-800/70 border-b border-slate-700">
                                                        <span className="text-[11px] font-semibold text-slate-300">💬 {cm.author}</span>
                                                        <span className="text-[10px] text-slate-500 ml-auto">코멘트</span>
                                                      </div>
                                                      <div className="px-2 py-1.5"><Markdown text={cm.body} /></div>
                                                    </div>
                                                  ))}
                                                </div>
                                              )}
                                          </div>
                                        ))}
                                      </div>
                                    )
                                  )}
                                </div>
                                {/* 리뷰 반영(기존 PR 갱신) */}
                                <div className="p-2 rounded bg-cyan-500/5 border border-cyan-500/20">
                                  <div className="flex items-center justify-between mb-1 gap-2">
                                    <span className="text-xs text-cyan-300">리뷰 반영 (기존 PR 갱신 · 새 PR 안 만듦)</span>
                                    <div className="flex gap-2">
                                      <Btn color="indigo" onClick={() => reworkCard(c.key)}>리뷰 반영 실행</Btn>
                                      <Btn color="violet" onClick={() => reworkThenReview(c.key)}>리뷰 반영 및 재리뷰</Btn>
                                    </div>
                                  </div>
                                  <textarea value={reworkMemo} onChange={(e) => setReworkMemo(e.target.value)} spellCheck={false}
                                    placeholder="(선택) 고칠 내용을 적으면 PR 코멘트로 남기고 반영합니다. 비우면 GitHub PR 리뷰·기존 코멘트만 보고 반영."
                                    className="w-full h-20 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-400" />
                                </div>
                                {/* PR 병합(rebase) */}
                                <div className="p-2 rounded bg-teal-500/5 border border-teal-500/20 flex items-center justify-between">
                                  <span className="text-xs text-teal-300">PR 병합 (자동화 PR 일괄 · rebase merge · 모두 병합되면 카드 완료 + clone 삭제)</span>
                                  <Btn color="green" onClick={() => mergeCard(c.key)}>PR 병합</Btn>
                                </div>
                              </div>
                            </div>
                          </div>
                        )}
                      </td></tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
          <div className="flex items-center justify-between mt-3 text-xs text-slate-400">
            <span>{q ? `검색 ${filtered.length}건` : `총 ${filtered.length}건`} · {cstart + 1}–{Math.min(cstart + CARD_PAGE_SIZE, filtered.length)} (최신 작성 먼저)</span>
            <div className="flex items-center gap-1">
              <CardPgBtn disabled={cpage <= 0} onClick={() => setCardPage(0)}>« 처음</CardPgBtn>
              <CardPgBtn disabled={cpage <= 0} onClick={() => setCardPage(cpage - 1)}>‹ 이전</CardPgBtn>
              <span className="px-2 text-slate-300">{cpage + 1} / {totalCardPages}</span>
              <CardPgBtn disabled={cpage >= totalCardPages - 1} onClick={() => setCardPage(cpage + 1)}>다음 ›</CardPgBtn>
              <CardPgBtn disabled={cpage >= totalCardPages - 1} onClick={() => setCardPage(totalCardPages - 1)}>마지막 »</CardPgBtn>
            </div>
          </div>
          </React.Fragment>
          );
        })()}
      </div>
    </Section>
  );
}

// =================== 전체 앱 ===================
function App() {
  const [projects, setProjects] = useState(null);
  const [status, setStatus] = useState({ plan: { running: false }, build: { running: false }, review: { running: false } });
  const [logs, setLogs] = useState({ plan: "", build: "" });
  const [history, setHistory] = useState([]);
  const [histPage, setHistPage] = useState(0);
  const [toast, setToast] = useState("");
  const [infoOpen, setInfoOpen] = useState(false);
  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2500); };

  const loadProjects = async () => { const r = await api.get("/api/projects"); setProjects(r.projects || []); };
  const loadHistory = async () => { const r = await api.get("/api/history?limit=100"); if (r.ok) setHistory(r.entries || []); };
  useEffect(() => { loadProjects(); loadHistory(); api.get("/api/loops/status").then(setStatus); }, []);
  useEffect(() => {
    const t = setInterval(async () => {
      setStatus(await api.get("/api/loops/status"));
      for (const type of ["plan", "build", "review"]) { const r = await api.get(`/api/logs/${type}?lines=120`); setLogs((p) => ({ ...p, [type]: r.log || "" })); }
      loadHistory();
    }, 4000);
    return () => clearInterval(t);
  }, []);

  const toggleLoop = async (type) => { const running = status[type]?.running; const r = await api.post(`/api/loops/${type}/${running ? "stop" : "start"}`); flash(r.ok ? `${type} 루프 ${running ? "중지" : "시작"}` : (r.message || "실패")); setStatus(await api.get("/api/loops/status")); };
  const runOnce = async (type) => { const r = await api.post(`/api/loops/${type}/run-once`); flash(r.ok ? `${type} 전체 즉시 실행 — 로그 확인` : (r.message || "실패")); };
  const syncMerged = async () => { const r = await api.post("/api/cards/sync-merged"); const done = (r.completed || []); flash(done.length ? `외부 병합 ${done.length}건 완료 반영: ${done.map((c) => c.key).join(", ")}` : "새로 완료된 외부 병합 없음"); loadProjects(); };
  const clearLog = async (type) => { if (!window.confirm(`loop-${type}.log 를 비울까요?`)) return; const r = await api.post(`/api/logs/${type}/clear`); if (r.ok) { setLogs((p) => ({ ...p, [type]: "" })); flash(`loop-${type}.log 비움`); } };
  const addProject = async () => { const name = window.prompt("새 프로젝트 이름?"); if (!name) return; const r = await api.post("/api/projects", { name }); if (r.ok) { flash(`프로젝트 추가됨: ${r.project.id}`); loadProjects(); } };

  if (!projects) return <div className="p-10">불러오는 중…</div>;

  return (
    <div className="max-w-5xl mx-auto px-6 py-8">
      <h1 className="text-2xl font-bold mb-1 flex items-center gap-2">
        Jira → Claude 자동화 대시보드
        <button onClick={() => setInfoOpen(true)} title="설치 요소·리소스 안내"
          className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-slate-700 hover:bg-indigo-600 text-slate-200 text-sm font-bold transition">i</button>
      </h1>
      <p className="text-slate-400 text-sm mb-6">여러 프로젝트를 동시에 운용합니다. 루프는 한 주기마다 모든 프로젝트를 순회합니다.</p>
      {toast && <div className="fixed top-4 right-4 bg-indigo-600 px-4 py-2 rounded-lg text-sm shadow-lg z-50">{toast}</div>}
      {infoOpen && <InfoModal onClose={() => setInfoOpen(false)} />}

      {/* 루프 제어 (전역) */}
      <Section title="루프 제어 (전 프로젝트 공통)" right={<div className="flex gap-2"><Btn color="green" onClick={syncMerged}>병합 동기화</Btn><Btn color="slate" onClick={loadProjects}>새로고침</Btn></div>}>
        <div className="grid grid-cols-3 gap-4">
          {["plan", "build", "review"].map((type) => {
            const running = status[type]?.running;
            const desc = type === "plan" ? "질문 코멘트 생성" : type === "build" ? "개발·PR 생성" : "PR 자동 리뷰";
            return (
              <div key={type} className="bg-slate-800/60 border border-slate-700 rounded-lg p-4">
                <div className="flex items-center justify-between mb-1">
                  <span className="font-semibold">{type} 루프</span>
                  <span className={`text-xs px-2 py-1 rounded-full border ${running ? "bg-emerald-500/20 text-emerald-300 border-emerald-500/40" : "bg-slate-600/30 text-slate-400 border-slate-600"}`}>{running ? `실행 중 (pid ${status[type].pid})` : "중지됨"}</span>
                </div>
                <div className="text-[11px] text-slate-500 mb-2">{desc}</div>
                <div className="flex gap-2"><Btn color={running ? "red" : "green"} onClick={() => toggleLoop(type)}>{running ? "중지" : "시작"}</Btn><Btn color="indigo" onClick={() => runOnce(type)}>전체 실행</Btn></div>
              </div>
            );
          })}
        </div>
        <p className="text-xs text-slate-500 mt-3">한 사이클마다 등록된 모든 프로젝트를 순회합니다(프로젝트별 동시 상한 적용). <b>review</b> 루프는 자동화가 올린 build PR 을 점검해, 문제없으면 승인 마커 코멘트를 남기고 이후 스킵합니다.</p>
      </Section>

      {/* 프로젝트들 */}
      <div className="flex items-center justify-between mb-3">
        <h2 className="text-lg font-semibold">프로젝트 ({projects.length})</h2>
        <Btn color="green" onClick={addProject}>+ 프로젝트 추가</Btn>
      </div>
      {projects.length === 0 && <p className="text-slate-500 text-sm mb-5">프로젝트가 없습니다. "+ 프로젝트 추가"로 시작하세요.</p>}
      {projects.map((p) => <ProjectCard key={p.id} proj={p} flash={flash} onDeleted={() => { flash("프로젝트 삭제됨"); loadProjects(); }} />)}

      {/* 처리 이력 (전역) — 페이지네이션 */}
      <Section title="처리 이력 (전 프로젝트)" collapsible defaultOpen right={<Btn color="slate" onClick={loadHistory}>새로고침</Btn>}>
        {history.length === 0 ? <p className="text-slate-500 text-sm">아직 처리 이력이 없습니다.</p> : (() => {
          const PAGE_SIZE = 10;
          const totalPages = Math.max(1, Math.ceil(history.length / PAGE_SIZE));
          const page = Math.min(histPage, totalPages - 1);   // 이력이 줄어도 안전하게 클램프
          const start = page * PAGE_SIZE;
          const pageRows = history.slice(start, start + PAGE_SIZE);
          const PgBtn = ({ disabled, onClick, children }) => (
            <button onClick={onClick} disabled={disabled}
              className="text-xs px-2 py-1 rounded border border-slate-600 text-slate-300 hover:border-indigo-500/50 hover:text-indigo-300 disabled:opacity-40 disabled:cursor-not-allowed transition">{children}</button>
          );
          return (
            <React.Fragment>
              <table className="w-full text-sm">
                <thead><tr className="text-slate-400 text-left border-b border-slate-700"><th className="py-2">시각</th><th>프로젝트</th><th>키</th><th>단계</th><th>결과</th><th>PR</th><th>브랜치</th></tr></thead>
                <tbody>
                  {pageRows.map((h, i) => {
                    const [label, cls] = resultBadge[h.result] || [h.result || "-", "bg-slate-600/30 text-slate-300 border-slate-600"];
                    return (
                      <tr key={`${h.ts}-${h.key}-${h.phase}-${start + i}`} className="border-b border-slate-800">
                        <td className="py-2 text-slate-400 whitespace-nowrap">{h.ts ? new Date(h.ts).toLocaleString() : "-"}</td>
                        <td className="text-slate-400">{h.project || "-"}</td>
                        <td className="text-slate-200">{h.key}</td><td className="text-slate-300">{h.phase}</td>
                        <td><span className={`inline-block whitespace-nowrap text-xs px-2 py-1 rounded-full border ${cls}`}>{label}</span></td>
                        <td>{h.pr ? <a href={h.pr} target="_blank" className="text-indigo-400 hover:underline">PR</a> : <span className="text-slate-600">-</span>}</td>
                        <td className="text-slate-400 font-mono text-xs">{h.branch || "-"}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              <div className="flex items-center justify-between mt-3 text-xs text-slate-400">
                <span>총 {history.length}건 · {start + 1}–{Math.min(start + PAGE_SIZE, history.length)}</span>
                <div className="flex items-center gap-1">
                  <PgBtn disabled={page <= 0} onClick={() => setHistPage(0)}>« 처음</PgBtn>
                  <PgBtn disabled={page <= 0} onClick={() => setHistPage(page - 1)}>‹ 이전</PgBtn>
                  <span className="px-2 text-slate-300">{page + 1} / {totalPages}</span>
                  <PgBtn disabled={page >= totalPages - 1} onClick={() => setHistPage(page + 1)}>다음 ›</PgBtn>
                  <PgBtn disabled={page >= totalPages - 1} onClick={() => setHistPage(totalPages - 1)}>마지막 »</PgBtn>
                </div>
              </div>
            </React.Fragment>
          );
        })()}
      </Section>

      {/* 실시간 로그 (전역) */}
      <Section title="실시간 로그 (전 프로젝트)" collapsible defaultOpen>
        <div className="grid grid-cols-3 gap-4">
          {["plan", "build", "review"].map((type) => (
            <div key={type}>
              <div className="flex items-center justify-between mb-1">
                <span className="text-sm text-slate-400">loop-{type}.log</span>
                <button onClick={() => clearLog(type)} className="text-xs text-slate-400 hover:text-rose-300 border border-slate-600 hover:border-rose-500/50 rounded px-2 py-0.5 transition">비우기</button>
              </div>
              <pre className="bg-black/60 border border-slate-700 rounded-lg p-3 text-xs h-64 overflow-auto whitespace-pre-wrap">{logs[type] || "(비어 있음)"}</pre>
            </div>
          ))}
        </div>
      </Section>

      <p className="text-center text-slate-600 text-xs mt-6">로컬 전용 · 토큰은 외부로 전송되지 않습니다</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <!-- 라이브 리로드 -->
  <script>
  (function () {
    var es, connectedBefore = false;
    function connect() {
      try { es = new EventSource("/api/livereload"); } catch (e) { return; }
      es.onmessage = function () { location.reload(); };
      es.onopen = function () { if (connectedBefore) location.reload(); connectedBefore = true; };
      es.onerror = function () { try { es.close(); } catch (e) {} setTimeout(connect, 1000); };
    }
    connect();
  })();
  </script>
</body>
</html>
